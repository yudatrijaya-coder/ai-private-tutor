version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-tutor-db
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor_pass
      POSTGRES_DB: ai_private_tutor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor -d ai_private_tutor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-tutor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
